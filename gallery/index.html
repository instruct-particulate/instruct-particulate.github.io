<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="Full image-conditioned generation gallery for Instruct-Particulate articulated 3D assets."
    />
    <link rel="canonical" href="https://instruct-particulate.github.io/gallery/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&display=swap"
    />
    <link rel="stylesheet" href="/webpage/image_conditioned/gallery.css" />
    <script type="module" src="https://unpkg.com/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>

    <title>Image-Conditioned Gallery | Instruct-Particulate</title>

    <style>
      :root {
        --surface-0: #ffffff;
        --surface-2: #f6f7f8;
        --text-primary: #111111;
        --text-secondary: #4d5561;
        --border-default: rgba(17, 17, 17, 0.12);
        --accent: #0c8ce9;
        --page-width: 1180px;
        --page-gutter: 48px;
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: light;
        -webkit-text-size-adjust: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text-primary);
        background: var(--surface-2);
        font-family: var(--font-sans);
        font-size: 13px;
        letter-spacing: 0;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a,
      button {
        font: inherit;
        letter-spacing: inherit;
      }

      a {
        color: inherit;
      }

      :focus {
        outline: none;
      }

      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .site-nav {
        position: fixed;
        z-index: 50;
        top: 0;
        right: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        min-height: 56px;
        padding: 0 32px;
        background: rgba(255, 255, 255, 0.9);
        border-bottom: 1px solid rgba(17, 17, 17, 0.12);
        backdrop-filter: blur(18px);
      }

      .site-mark,
      .site-nav a {
        color: #111111;
        text-decoration: none;
      }

      .site-mark {
        font-size: 13px;
        font-weight: 700;
      }

      .brand-smallcaps {
        font-variant-caps: small-caps;
        font-feature-settings: "smcp" 1, "c2sc" 1;
        letter-spacing: 0.03em;
      }

      .site-nav nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 4px;
      }

      .site-nav nav a {
        color: #50565f;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 500;
      }

      .site-nav nav a:hover,
      .site-nav nav a:focus-visible {
        color: #111111;
      }

      .gallery-page {
        width: min(var(--page-width), calc(100% - var(--page-gutter)));
        margin: 0 auto;
        padding: 112px 0 84px;
      }

      .section-heading {
        margin-bottom: 32px;
        text-align: center;
      }

      .section-heading h1 {
        margin: 0;
        color: #111111;
        font-size: clamp(30px, 4vw, 48px);
        font-weight: 640;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .section-heading p {
        max-width: 760px;
        margin: 14px auto 0;
        color: var(--text-secondary);
        font-size: clamp(16px, 1.7vw, 20px);
        line-height: 1.5;
        text-wrap: pretty;
      }

      @media (max-width: 760px) {
        :root {
          --page-gutter: 32px;
        }

        .site-nav {
          align-items: flex-start;
          flex-direction: column;
          gap: 5px;
          padding: 10px 20px;
        }

        .site-nav nav {
          justify-content: flex-start;
        }

        .site-nav nav a {
          padding: 5px 8px 6px 0;
        }

        .gallery-page {
          padding: 112px 0 58px;
        }
      }
    </style>
  </head>

  <body>
    <header class="site-nav">
      <a href="/" class="site-mark brand-smallcaps">Instruct-Particulate</a>
      <nav aria-label="Project sections">
        <a href="/#image-conditioned">Project</a>
        <a href="/gallery/">Gallery</a>
      </nav>
    </header>

    <main class="gallery-page">
      <div class="section-heading">
        <h1>Image-Conditioned Generation Gallery</h1>
        <p>All image-conditioned articulated 3D asset results.</p>
      </div>

      <div class="generation-grid" data-generation-grid aria-label="Full image-conditioned articulated 3D asset gallery">
      </div>
    </main>

    <script type="module">
      import { generationItems, renderGenerationGrid } from "/webpage/image_conditioned/gallery.js";

      const generationGrid = document.querySelector("[data-generation-grid]");
      if (generationGrid) {
        renderGenerationGrid(generationGrid, generationItems);
      }
    </script>
  </body>
</html>
